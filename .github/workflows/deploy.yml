name: Deploy Website to Websupport

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v3

    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Websupport usually uses public_html or something similar. 
        # By default, it uploads to the root of the FTP account.
        # If your web is in a subfolder like 'public_html', add it here:
        # server-dir: public_html/
