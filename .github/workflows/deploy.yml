name: Deploy website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP Deploy with lftp
        run: |
          sudo apt-get update && sudo apt-get install lftp -y
          lftp -d -c "set ftp:ssl-allow no; debug 3; open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ftp.valorfortis.cz; mirror -Rnev --exclude .git/ --exclude .github/ ./ /valorfortis.cz/web/"
